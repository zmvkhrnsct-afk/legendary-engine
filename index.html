<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бессмертный полк</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;

  /* 🖼️ ФОН */
  background-image: url("https://avatars.mds.yandex.net/get-altay/2786941/2a000001764d11b85db4b67e6762ddc3d31b/XXL_height");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* 🌑 затемнение фона */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: -1;
}

/* HEADER */
.header {
  text-align: center;
  padding: 25px;
  border-bottom: 2px solid gold;
}

.header h1 {
  margin: 0;
  color: gold;
}

.header p {
  margin: 5px 0 0;
  color: #ffd700;
}

/* LAYOUT */
.container {
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 30px;
  flex-wrap: wrap;
}

/* BOX */
.form-box,
.list-box {
  background: rgba(0,0,0,0.75);
  padding: 20px;
  border-radius: 12px;
  width: 340px;
  border: 1px solid gold;
}

/* FORM */
.form-grid {
  display: grid;
  gap: 10px;
}

input, select {
  width: 100%;
  box-sizing: border-box;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #444;
  background: #111;
  color: white;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  background: gold;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
}

/* LIST */
.list-item {
  border-bottom: 1px solid #333;
  padding: 8px 0;
  font-size: 14px;
}

/* SEARCH */
.search {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #444;
  background: #111;
  color: white;
}

/* TOAST */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #222;
  padding: 12px 16px;
  border-radius: 8px;
  border-left: 4px solid gold;
  opacity: 0;
  transition: 0.3s;
  z-index: 999;
}

.toast.show { opacity: 1; }
.toast.error { border-left: 4px solid red; }
.toast.success { border-left: 4px solid limegreen; }

/* MOBILE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
    align-items: center;
  }

  .form-box,
  .list-box {
    width: 90%;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>БЕССМЕРТНЫЙ ПОЛК</h1>
  <p>Сохранение памяти о ветеранах</p>
</div>

<div class="container">

  <!-- FORM -->
  <div class="form-box">
    <h3>Добавить ветерана</h3>

    <div class="form-grid">
      <input id="lastName" placeholder="Фамилия">
      <input id="firstName" placeholder="Имя">
      <input id="middleName" placeholder="Отчество">

      <select id="category">
        <option value="">Категория</option>
        <option>Ветеран войны</option>
        <option>Ветеран тыла</option>
        <option>Ребёнок войны</option>
        <option>СВО</option>
      </select>

      <button onclick="submitForm()">Добавить</button>
    </div>
  </div>

  <!-- LIST -->
  <div class="list-box">
    <h3>Список участников</h3>

    <input class="search" placeholder="Поиск..." oninput="filterList(this.value)">

    <div id="list"></div>
  </div>

</div>

<div id="toast" class="toast"></div>

<script>

/* 🔗 ССЫЛКИ */
const urls = {
  'Ветеран тыла': 'https://script.google.com/macros/s/AKfycbzMDk_v-8awvzqdkgw_kaiOlWThrLTRS1mnegk3wzrWZY-Ym2ilQi7re9AN4Erxqbefmg/exec',

  'Ветеран войны': 'https://script.google.com/macros/s/AKfycbwJ46jM_kd1i6dQQuuUBTwrXOdn_DOiJgz2vnfzsr1wOSKZX-N5n_3dS4pMmvnQYmSK3g/exec',

  'Ребёнок войны': 'https://script.google.com/macros/s/AKfycbycCJEug9-wVsiLoDJxYNMEI_RAtRyTpS6NUhZW8a64In6B4cEz4scis0WSRWvSHgUP/exec',

  'СВО': 'https://script.google.com/macros/s/AKfycbymq0dqHxElmb-LFlbmmerRfp4qsLtYn-7K4NOtL2_11CroHdCgdgU8jqNBzIID4NJdcw/exec'
};

let cache = [];
let filtered = [];

/* LOAD */
async function loadList() {
  try {
    const url = urls['Ветеран войны'];

    const res = await fetch(url, {
      method: 'POST',
      body: JSON.stringify({ action: 'get' })
    });

    const text = await res.text();
    const data = JSON.parse(text);

    if (data.list) {
      cache = data.list;
      filtered = cache;
      render();
    }
  } catch (e) {
    toast('Ошибка загрузки', 'error');
  }
}

/* SUBMIT */
async function submitForm() {
  const lastName = document.getElementById('lastName').value.trim();
  const firstName = document.getElementById('firstName').value.trim();
  const middleName = document.getElementById('middleName').value.trim();
  const category = document.getElementById('category').value;

  const fullName = (lastName + ' ' + firstName + ' ' + middleName).trim();

  if (!lastName || !firstName || !category) {
    toast('Заполните поля', 'error');
    return;
  }

  if (cache.some(x => x.fullName === fullName)) {
    toast('Уже в списке', 'error');
    return;
  }

  const data = { lastName, firstName, middleName, fullName, category };

  try {
    const res = await fetch(urls[category], {
      method: 'POST',
      body: JSON.stringify(data)
    });

    const text = await res.text();
    const result = JSON.parse(text);

    if (result.result === 'success') {
      toast('Добавлено', 'success');
      cache.unshift(data);
      filtered = cache;
      render();
    } else {
      toast(result.message, 'error');
    }

  } catch (e) {
    toast('Ошибка сети', 'error');
  }
}

/* RENDER */
function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  filtered.slice(0, 50).forEach(item => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.textContent = `${item.fullName} — ${item.category}`;
    list.appendChild(div);
  });
}

/* SEARCH */
function filterList(val) {
  const q = val.toLowerCase();
  filtered = cache.filter(x =>
    x.fullName.toLowerCase().includes(q)
  );
  render();
}

/* TOAST */
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;

  setTimeout(() => t.className = 'toast', 2500);
}

loadList();

</script>

</body>
</html>
