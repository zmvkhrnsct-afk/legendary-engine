<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Бессмертный полк — р.п. Любинский</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', 'Segoe UI', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.4) contrast(1.1);
        }

        /* Тёмная наложение для лучшей читаемости */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        /* Георгиевская лента (верхняя) */
        .ribbon-top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 12px;
            background: linear-gradient(90deg, 
                #000 0%, #000 20%,
                #FF8C00 20%, #FF8C00 40%,
                #000 40%, #000 60%,
                #FF8C00 60%, #FF8C00 80%,
                #000 80%, #000 100%
            );
            background-size: 50px 100%;
            z-index: 1000;
        }

        /* Георгиевская лента (нижняя) */
        .ribbon-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 12px;
            background: linear-gradient(90deg, 
                #000 0%, #000 20%,
                #FF8C00 20%, #FF8C00 40%,
                #000 40%, #000 60%,
                #FF8C00 60%, #FF8C00 80%,
                #000 80%, #000 100%
            );
            background-size: 50px 100%;
            z-index: 1000;
        }

        .card {
            background: rgba(30, 15, 10, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 48px 48px 48px 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            max-width: 550px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
            position: relative;
            border: 1px solid #d4a373;
            transition: all 0.3s;
        }

        /* Звезда в углу карточки */
        .card::before {
            content: "★";
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 40px;
            color: #FFD700;
            opacity: 0.5;
            font-weight: normal;
            text-shadow: 0 0 5px #c41e3a;
        }

        /* Орденская ленточка */
        .medal-ribbon {
            position: absolute;
            top: -8px;
            left: 30px;
            width: 80px;
            height: 25px;
            background: repeating-linear-gradient(45deg, 
                #000 0px, #000 8px,
                #FF8C00 8px, #FF8C00 16px
            );
            border-radius: 15px 15px 0 0;
        }

        /* Название района */
        .district {
            font-size: 14px;
            letter-spacing: 3px;
            color: #FFD700;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: normal;
            text-shadow: 1px 1px 0 #4a0000;
        }

        h1 {
            font-size: 34px;
            color: #FFD700;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0 #8B0000;
        }

        .subtitle {
            color: #f0c0a0;
            font-size: 16px;
            margin-bottom: 20px;
            border-bottom: 2px solid #c41e3a;
            padding-bottom: 12px;
            display: inline-block;
            font-style: italic;
        }

        .victory-symbol {
            margin: 10px 0 20px;
            font-size: 48px;
            letter-spacing: 10px;
            color: #FFD700;
            text-shadow: 0 0 5px #c41e3a;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #FFE4C4;
            font-size: 15px;
            font-family: 'Segoe UI', sans-serif;
            text-shadow: 1px 1px 0 #2a0a0a;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 2px solid #c4a06a;
            border-radius: 40px;
            transition: all 0.2s;
            font-family: inherit;
            background: rgba(255, 245, 235, 0.95);
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255,215,0,0.3);
            background: white;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #8B0000 0%, #c41e3a 100%);
            color: #FFD700;
            border: none;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
            font-family: 'Georgia', serif;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #4a0000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        button:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #a01020 0%, #d42a4a 100%);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        button:active {
            transform: scale(0.98);
        }

        .success {
            background: #1e4a2f;
            color: #d4ffc4;
            padding: 14px;
            border-radius: 40px;
            margin-top: 24px;
            font-weight: 500;
            display: none;
            border-left: 6px solid #FFD700;
        }

        .error {
            background: #5a1a1a;
            color: #ffb3b3;
            padding: 14px;
            border-radius: 40px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
            border-left: 6px solid #FFD700;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 50%;
            border-top-color: #FFD700;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info {
            font-size: 11px;
            color: #e0c8a8;
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px dashed #c4a06a;
            font-family: 'Segoe UI', sans-serif;
        }

        .field-required {
            color: #FFD700;
            margin-left: 4px;
        }

        .poem-line {
            font-size: 13px;
            color: #FFD700;
            margin-top: 20px;
            font-style: italic;
            line-height: 1.4;
            text-shadow: 1px 1px 0 #4a0000;
        }

        /* Адаптация для мобильных */
        @media (max-width: 550px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 26px;
            }
            .victory-symbol {
                font-size: 36px;
            }
            button {
                font-size: 16px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ВИДЕОФОН: военная хроника, солдаты СССР -->
    <video class="video-background" autoplay muted loop playsinline>
        <source src="https://cdn.pixabay.com/video/2022/05/03/115612-706286688_large.mp4" type="video/mp4">
        <!-- Запасной вариант: если первое видео недоступно, используем второе -->
        <source src="https://cdn.pixabay.com/video/2021/05/08/72960-542480536_large.mp4" type="video/mp4">
        Ваш браузер не поддерживает видеофон.
    </video>
    <div class="overlay"></div>

    <div class="ribbon-top"></div>
    <div class="ribbon-bottom"></div>

    <div class="card">
        <div class="medal-ribbon"></div>
        <div class="district">р.п. ЛЮБИНСКИЙ</div>
        <div class="victory-symbol">
            <span>★</span> <span style="color:#FFD700;">⚔️</span> <span>★</span>
        </div>
        <h1>БЕССМЕРТНЫЙ ПОЛК</h1>
        <div class="subtitle">Помним • Гордимся • Благодарим</div>

        <form id="registerForm">
            <div class="form-group">
                <label>Фамилия ветерана <span class="field-required">*</span></label>
                <input type="text" id="lastName" placeholder="Иванов" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label>Имя ветерана <span class="field-required">*</span></label>
                <input type="text" id="firstName" placeholder="Иван" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label>Отчество ветерана</label>
                <input type="text" id="middleName" placeholder="Иванович" autocomplete="off">
            </div>

            <button type="submit" id="submitBtn">⭐ ВСТАТЬ В БЕССМЕРТНЫЙ ПОЛК ⭐</button>
        </form>

        <div id="successMessage" class="success"></div>
        <div id="errorMessage" class="error"></div>
        
        <div class="poem-line">
            «Никто не забыт, ничто не забыто»
        </div>
        <div class="info">
            🕯️ Нажимая кнопку, вы сохраняете память о герое<br>
            Данные будут внесены в список Бессмертного полка р.п. Любинский
        </div>
    </div>

    <script>
        // === ВАША ССЫЛКА НА GOOGLE APPS SCRIPT ===
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyiRU0gLCXwGPxptJw5P9Ldh0DkzzTu9kodOvmcJx8FLwpydIvD_XoyNxDU9fTf1euBqw/exec';
        
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('submitBtn');
        const successDiv = document.getElementById('successMessage');
        const errorDiv = document.getElementById('errorMessage');

        function showSuccess(text) {
            successDiv.style.display = 'block';
            successDiv.innerText = text || '✓ Спасибо! Ваш герой будет в строю Бессмертного полка. Вечная память!';
            errorDiv.style.display = 'none';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 6000);
        }

        function showError(text) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = text || '❌ Ошибка. Попробуйте ещё раз или обратитесь к организатору.';
            successDiv.style.display = 'none';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Отправка...';
            } else {
                btn.disabled = false;
                btn.innerHTML = '⭐ ВСТАТЬ В БЕССМЕРТНЫЙ ПОЛК ⭐';
            }
        }

        function getFullName() {
            const lastName = document.getElementById('lastName').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const middleName = document.getElementById('middleName').value.trim();
            
            let fullName = `${lastName} ${firstName}`;
            if (middleName) fullName += ` ${middleName}`;
            return fullName;
        }

        async function sendToGoogleSheets(data) {
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return true;
            } catch (err) {
                console.error('Ошибка:', err);
                return false;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const lastName = document.getElementById('lastName').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            
            if (!lastName || !firstName) {
                showError('Пожалуйста, заполните фамилию и имя ветерана');
                return;
            }

            const middleName = document.getElementById('middleName').value.trim();
            const fullName = getFullName();

            const participantData = {
                lastName: lastName,
                firstName: firstName,
                middleName: middleName,
                fullName: fullName
            };

            setLoading(true);
            
            try {
                const success = await sendToGoogleSheets(participantData);
                
                if (success) {
                    showSuccess(`${fullName} добавлен в Бессмертный полк р.п. Любинский! Вечная память герою.`);
                    form.reset();
                } else {
                    showError('Не удалось сохранить. Попробуйте позже.');
                }
            } catch (err) {
                console.error('Ошибка:', err);
                showError('Ошибка соединения. Проверьте интернет.');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
