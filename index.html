<!DOCTYPE html>
<html lang="ru">
<head:
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title:Бессмертный полк — р.п. Любинский</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .video-background-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        .video-background-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            pointer-events: none;
            border: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .ribbon-top, .ribbon-bottom {
            position: fixed;
            left: 0;
            right: 0;
            height: 12px;
            background: linear-gradient(90deg, 
                #000 0%, #000 20%,
                #FF8C00 20%, #FF8C00 40%,
                #000 40%, #000 60%,
                #FF8C00 60%, #FF8C00 80%,
                #000 80%, #000 100%);
            background-size: 50px 100%;
            z-index: 1000;
        }
        .ribbon-top { top: 0; }
        .ribbon-bottom { bottom: 0; }

        .card {
            background: rgba(30, 15, 10, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px 48px 48px 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            max-width: 550px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
            position: relative;
            border: 1px solid rgba(212, 163, 115, 0.6);
            transition: all 0.3s ease;
        }

        .card::before {
            content: "★";
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 40px;
            color: #FFD700;
            opacity: 0.5;
        }

        .medal-ribbon {
            position: absolute;
            top: -8px;
            left: 30px;
            width: 80px;
            height: 25px;
            background: repeating-linear-gradient(45deg, 
                #000 0px, #000 8px,
                #FF8C00 8px, #FF8C00 16px);
            border-radius: 15px 15px 0 0;
        }

        .district {
            font-size: 14px;
            letter-spacing: 3px;
            color: #FFD700;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 500;
            text-shadow: 1px 1px 0 #4a0000;
        }

        h1 {
            font-size: 34px;
            color: #FFD700;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #8B0000;
        }

        .subtitle {
            color: #f0c0a0;
            font-size: 16px;
            margin-bottom: 20px;
            border-bottom: 2px solid #c41e3a;
            padding-bottom: 12px;
            display: inline-block;
            font-style: italic;
        }

        .victory-symbol {
            margin: 10px 0 20px;
            font-size: 48px;
            letter-spacing: 10px;
            color: #FFD700;
            text-shadow: 0 0 5px #c41e3a;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #FFE4C4;
            font-size: 15px;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            text-shadow: 1px 1px 0 #2a0a0a;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 2px solid #c4a06a;
            border-radius: 40px;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: rgba(255, 245, 235, 0.95);
            transition: all 0.25s ease-in-out;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255,215,0,0.3);
            background: white;
            padding: 16px 20px;
            font-size: 18px;
        }

        select {
            appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%238B0000%22%3E%3Cpath%20d%3D%22M7%2010l5%205%205-5z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 20px;
            cursor: pointer;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #8B0000 0%, #c41e3a 100%);
            color: #FFD700;
            border: none;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 16px;
            font-family: 'Georgia', serif;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #4a0000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        button:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #a01020 0%, #d42a4a 100%);
        }

        button:active {
            transform: scale(0.98);
        }

        .success {
            background: #1e4a2f;
            color: #d4ffc4;
            padding: 14px;
            border-radius: 40px;
            margin-top: 24px;
            font-weight: 500;
            display: none;
            border-left: 6px solid #FFD700;
        }

        .error {
            background: #5a1a1a;
            color: #ffb3b3;
            padding: 14px;
            border-radius: 40px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
            border-left: 6px solid #FFD700;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 50%;
            border-top-color: #FFD700;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info {
            font-size: 11px;
            color: #e0c8a8;
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px dashed #c4a06a;
            font-family: 'Segoe UI', sans-serif;
        }

        .field-required {
            color: #FFD700;
            margin-left: 4px;
        }

        .poem-line {
            font-size: 13px;
            color: #FFD700;
            margin-top: 20px;
            font-style: italic;
            line-height: 1.4;
            text-shadow: 1px 1px 0 #4a0000;
        }

        .reset-btn {
            background: rgba(0,0,0,0.5);
            color: #FFD700;
            font-size: 12px;
            padding: 6px 12px;
            margin-top: 16px;
            width: auto;
            display: inline-block;
            cursor: pointer;
            border-radius: 30px;
            border: 1px solid #c4a06a;
            transition: 0.2s;
        }
        .reset-btn:hover {
            background: rgba(0,0,0,0.7);
            transform: scale(1.02);
        }

        @media (max-width: 550px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 26px; }
            .victory-symbol { font-size: 36px; }
            button { font-size: 16px; padding: 14px; }
            input:focus, select:focus {
                padding: 14px 20px;
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

    <div class="video-background-wrapper">
        <iframe 
            src="https://vkvideo.ru/video_ext.php?oid=-34261602&id=456244048&hd=3&autoplay=1&loop=1&mute=1" 
            frameborder="0" 
            allow="autoplay; encrypted-media; fullscreen; picture-in-picture; loop" 
            allowfullscreen>
        </iframe>
    </div>
    <div class="overlay"></div>

    <div class="ribbon-top"></div>
    <div class="ribbon-bottom"></div>

    <div class="card">
        <div class="medal-ribbon"></div>
        <div class="district">р.п. ЛЮБИНСКИЙ</div>
        <div class="victory-symbol">★ ⚔️ ★</div>
        <h1>БЕССМЕРТНЫЙ ПОЛК</h1>
        <div class="subtitle">Помним • Гордимся • Благодарим</div>

        <form id="registerForm">
            <div class="form-group">
                <label>Категория участника <span class="field-required">*</span></label>
                <select id="category" required>
                    <option value="" disabled selected>Выберите категорию</option>
                    <option value="Ветеран войны">Ветеран войны</option>
                    <option value="Ветеран тыла">Ветеран тыла</option>
                    <option value="Ребёнок войны">Ребёнок войны</option>
                    <option value="СВО">СВО</option>
                </select>
            </div>

            <div class="form-group">
                <label>Фамилия ветерана <span class="field-required">*</span></label>
                <input type="text" id="lastName" placeholder="Иванов" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label>Имя ветерана <span class="field-required">*</span></label>
                <input type="text" id="firstName" placeholder="Иван" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label>Отчество ветерана</label>
                <input type="text" id="middleName" placeholder="Иванович" autocomplete="off">
            </div>

            <button type="submit" id="submitBtn">⭐ ВСТАТЬ В БЕССМЕРТНЫЙ ПОЛК ⭐</button>
        </form>

        <div id="successMessage" class="success"></div>
        <div id="errorMessage" class="error"></div>
        
        <div class="poem-line">«Никто не забыт, ничто не забыто»</div>
        <div class="info">
            🕯️ Нажимая кнопку, вы сохраняете память о герое<br>
            Данные будут внесены в соответствующий список Бессмертного полка р.п. Любинский
        </div>
        <div class="reset-btn" id="resetStorageBtn">🗑️ Сбросить историю отправок (для тестов)</div>
    </div>

    <script>
        // === ССЫЛКИ НА GOOGLE APPS SCRIPT ===
        const SCRIPT_URLS = {
            "Ветеран войны": "https://script.google.com/macros/s/AKfycbyiRU0gLCXwGPxptJw5P9Ldh0DkzzTu9kodOvmcJx8FLwpydIvD_XoyNxDU9fTf1euBqw/exec",
            "Ветеран тыла": "https://script.google.com/macros/s/AKfycbzUOD5jecDcxZSrbmIcmUNw4xO9NvFywmMr6eCPi1DzZsBTcKDX9IBNtLO7nAv5xxzF5Q/exec",
            "Ребёнок войны": "https://script.google.com/macros/s/AKfycbwuc4me6F2SWLfvNrHSe4KIlbKDni08ZMozDDvOqbcDTMc_y6aDiFQ6C5vBCVvwP73A/exec",
            "СВО": "https://script.google.com/macros/s/AKfycbyCU0gPJQJ0-BynQg8GD-PF_LwouQnOHpJLxkXh1_RU/dev"
        };

        // === РАБОТА С LOCALSTORAGE ДЛЯ ЗАПРЕТА ДУБЛЕЙ ===
        const STORAGE_KEY = "ImmortalRegimentSentList";
        
        // Загружаем список уже отправленных записей (объект: ключ -> true)
        let sentRecords = {};

        function loadSentRecords() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    sentRecords = JSON.parse(stored);
                } catch(e) { sentRecords = {}; }
            } else {
                sentRecords = {};
            }
        }

        function saveSentRecords() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sentRecords));
        }

        // Генерируем уникальный ключ для проверки дубля: категория + нормализованное ФИО
        function getRecordKey(category, lastName, firstName, middleName) {
            const normalize = (s) => s.trim().toLowerCase().replace(/\s+/g, ' ');
            const full = `${normalize(lastName)} ${normalize(firstName)} ${normalize(middleName || '')}`.trim();
            return `${category}|${full}`;
        }

        function isDuplicate(category, lastName, firstName, middleName) {
            const key = getRecordKey(category, lastName, firstName, middleName);
            return !!sentRecords[key];
        }

        function markAsSent(category, lastName, firstName, middleName) {
            const key = getRecordKey(category, lastName, firstName, middleName);
            sentRecords[key] = true;
            saveSentRecords();
        }

        // Сброс истории (для отладки / тестов)
        function resetHistory() {
            sentRecords = {};
            saveSentRecords();
            showSuccess("История отправок очищена. Теперь можно повторно добавлять ранее введённых ветеранов.");
        }

        // === ОСТАЛЬНАЯ ЛОГИКА ФОРМЫ ===
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('submitBtn');
        const successDiv = document.getElementById('successMessage');
        const errorDiv = document.getElementById('errorMessage');
        const resetBtn = document.getElementById('resetStorageBtn');

        function showSuccess(text) {
            successDiv.style.display = 'block';
            successDiv.innerText = text;
            errorDiv.style.display = 'none';
            setTimeout(() => successDiv.style.display = 'none', 6000);
        }

        function showError(text) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = text;
            successDiv.style.display = 'none';
        }

        function setLoading(isLoading) {
            btn.disabled = isLoading;
            btn.innerHTML = isLoading ? '<span class="spinner"></span> Отправка...' : '⭐ ВСТАТЬ В БЕССМЕРТНЫЙ ПОЛК ⭐';
        }

        function getFullName() {
            const lastName = document.getElementById('lastName').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const middleName = document.getElementById('middleName').value.trim();
            return `${lastName} ${firstName}${middleName ? ' ' + middleName : ''}`;
        }

        async function sendToGoogleSheets(url, data) {
            try {
                console.log(`Отправка данных на URL: ${url}`, data);
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return true;
            } catch (err) {
                console.error('Ошибка отправки:', err);
                return false;
            }
        }

        // Инициализация: загружаем историю при старте
        loadSentRecords();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const lastName = document.getElementById('lastName').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const middleName = document.getElementById('middleName').value.trim();
            const category = document.getElementById('category').value;

            if (!lastName || !firstName) {
                showError('Пожалуйста, заполните фамилию и имя ветерана');
                return;
            }
            if (!category) {
                showError('Пожалуйста, выберите категорию участника');
                return;
            }

            // Проверка на дублирование (в рамках выбранной категории)
            if (isDuplicate(category, lastName, firstName, middleName)) {
                showError(`⚠️ Ветеран "${getFullName()}" уже был добавлен в категорию "${category}". Повторная отправка невозможна.`);
                return;
            }

            const scriptUrl = SCRIPT_URLS[category];
            if (!scriptUrl) {
                showError('Для выбранной категории не настроена отправка. Свяжитесь с администратором.');
                return;
            }

            const fullName = getFullName();
            const participantData = {
                category: category,
                lastName: lastName,
                firstName: firstName,
                middleName: middleName,
                fullName: fullName,
                timestamp: new Date().toISOString()
            };

            setLoading(true);
            try {
                const success = await sendToGoogleSheets(scriptUrl, participantData);
                if (success) {
                    // Помечаем как отправленного, чтобы больше не дублировать
                    markAsSent(category, lastName, firstName, middleName);
                    showSuccess(`✅ ${fullName} (${category}) добавлен в Бессмертный полк р.п. Любинский! Вечная память герою.`);
                    form.reset();
                } else {
                    showError('❌ Не удалось сохранить. Попробуйте позже.');
                }
            } catch (err) {
                showError('Ошибка соединения. Проверьте интернет.');
            } finally {
                setLoading(false);
            }
        });

        // Кнопка сброса истории
        resetBtn.addEventListener('click', () => {
            resetHistory();
        });
    </script>
</body>
</html>
