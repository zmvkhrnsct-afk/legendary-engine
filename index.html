<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Форма</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      width: 320px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .status {
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
    }

    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>

<div class="form-container">
  <h2>Добавить запись</h2>

  <form id="form">
    <input type="text" id="lastName" placeholder="Фамилия" required>
    <input type="text" id="firstName" placeholder="Имя" required>
    <input type="text" id="middleName" placeholder="Отчество">

    <select id="category" required>
      <option value="">Выберите категорию</option>
      <option>Ребёнок войны</option>
      <option>Ветеран войны</option>
      <option>Ветеран тыла</option>
      <option>СВО</option>
    </select>

    <button type="submit">Отправить</button>
  </form>

  <div id="status" class="status"></div>
</div>

<script>
document.getElementById('form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const statusDiv = document.getElementById('status');

  const lastName = document.getElementById('lastName').value.trim();
  const firstName = document.getElementById('firstName').value.trim();
  const middleName = document.getElementById('middleName').value.trim();
  const category = document.getElementById('category').value;

  const fullName = (lastName + ' ' + firstName + ' ' + middleName).trim();

  // ✅ Валидация
  if (!lastName || !firstName || !category) {
    showStatus('Заполните обязательные поля', 'error');
    return;
  }

  const data = {
    lastName,
    firstName,
    middleName,
    fullName,
    category
  };

  // 🔗 ТВОИ НОВЫЕ ССЫЛКИ
  const urlMap = {
    'СВО': 'https://script.google.com/macros/s/AKfycbwdc6zuaeJtxjRGPrEmAXlB_26x911RA1SpqPnl4IUlxElg5TvvPHzKT2jwoyVBUMZRFw/exec',
    'Ветеран войны': 'https://script.google.com/macros/s/AKfycbwB5Xn8Jp5jnR78uXbT-aJGfPJsBmtC8_DjWolg8Z4QKfQA6RDDTjS5Vg3HlWYENGB-dw/exec',
    'Ребёнок войны': 'https://script.google.com/macros/s/AKfycbxlG5nq_QtERuMa0FRzccoTXq6wHCR2vzOtHHtPtkalV7IOvYFH0XPtv8-6TyXP2biQ/exec',
    'Ветеран тыла': 'https://script.google.com/macros/s/AKfycbxads4RRuNUkMDHYGyFJtErsMaQHeWpgRMbxkPFK_DgTzjeNi3SPqfQY8P1nKydc1xu-g/exec'
  };

  const url = urlMap[category];

  if (!url) {
    showStatus('Ошибка категории', 'error');
    return;
  }

  try {
    showStatus('Отправка...', '');

    const response = await fetch(url, {
      method: 'POST',
      body: JSON.stringify(data),
      headers: {
        'Content-Type': 'text/plain' // 🔥 важно для Apps Script
      }
    });

    const text = await response.text();

    let result;
    try {
      result = JSON.parse(text);
    } catch {
      throw new Error('Сервер вернул не JSON');
    }

    if (result.result === 'success') {
      showStatus('Успешно отправлено', 'success');
      document.getElementById('form').reset();
    } else {
      showStatus(result.message || 'Ошибка', 'error');
    }

  } catch (error) {
    console.error(error);
    showStatus('Ошибка: ' + error.message, 'error');
  }
});

function showStatus(message, type) {
  const statusDiv = document.getElementById('status');
  statusDiv.textContent = message;
  statusDiv.className = 'status ' + type;
}
</script>

</body>
</html>
