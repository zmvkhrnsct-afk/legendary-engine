<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бессмертный полк | Любинский район</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#07090e;
color:white;
background-image:url('https://avatars.mds.yandex.net/get-altay/2786941/2a000001764d11b85db4b67e6762ddc3d31b/XXL_height');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

body::before{
content:'';
position:fixed;
inset:0;
background:rgba(0,0,0,.82);
z-index:-1;
}

.header{
text-align:center;
padding:30px 20px;
}

.header h1{
font-size:42px;
color:#f9b81b;
}

.container{
max-width:1300px;
margin:auto;
display:flex;
gap:30px;
padding:20px;
flex-wrap:wrap;
}

.box{
flex:1 1 500px;
background:rgba(10,10,15,.9);
padding:25px;
border-radius:30px;
border:1px solid rgba(255,215,0,.3);
}

.box h2{
margin-bottom:20px;
color:#f9b81b;
}

input,
textarea,
select{
width:100%;
padding:14px;
margin-bottom:12px;
background:#11151f;
border:1px solid #333;
border-radius:18px;
color:white;
font-size:15px;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:#f9b81b;
color:black;
font-weight:700;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.search{
margin-bottom:20px;
}

.list{
display:flex;
flex-direction:column;
gap:15px;
max-height:700px;
overflow-y:auto;
}

.card{
display:flex;
gap:15px;
background:#171b25;
padding:15px;
border-radius:20px;
border:1px solid rgba(255,215,0,.2);
}

.card img{
width:90px;
height:90px;
object-fit:cover;
border-radius:15px;
border:2px solid #f9b81b;
}

.info{
flex:1;
}

.name{
font-size:18px;
font-weight:700;
color:#ffe5a3;
margin-bottom:6px;
}

.category{
display:inline-block;
padding:4px 12px;
background:rgba(249,184,27,.2);
border-radius:30px;
font-size:12px;
margin-bottom:10px;
color:#f9b81b;
}

.bio{
font-size:14px;
opacity:.9;
margin-top:8px;
}

.rep{
font-size:13px;
opacity:.8;
margin-top:5px;
}

.preview img{
width:100px;
height:100px;
object-fit:cover;
border-radius:20px;
margin-top:10px;
border:2px solid #f9b81b;
}

</style>
</head>
<body>

<div class="header">
<h1>БЕССМЕРТНЫЙ ПОЛК</h1>
<p>Любинского района</p>
</div>

<div class="container">

<div class="box">

<h2>Добавить ветерана</h2>

<input id="lastName" placeholder="Фамилия">

<input id="firstName" placeholder="Имя">

<input id="middleName" placeholder="Отчество">

<select id="category">

<option value="">Выберите категорию</option>

<option>СВО</option>

<option>Ветеран войны</option>

<option>Ветеран тыла</option>

<option>Ребёнок войны</option>

</select>

<input id="representative"
placeholder="Представитель">

<textarea id="biography"
placeholder="Биография"></textarea>

<input type="file" id="photo">

<div class="preview" id="preview"></div>

<button onclick="saveVeteran()">

Сохранить память

</button>

</div>

<div class="box">

<h2>Стена памяти</h2>

<input
class="search"
id="search"
placeholder="Поиск..."
oninput="filterList()">

<div class="list" id="list"></div>

</div>

</div>

<script>

const URLS = {

'СВО':
'https://script.google.com/macros/s/AKfycbwfGI1RDvsui963gRx5uEyZ1hvSH8XAwFr5MMycS3xrE0yR41wW2_vstFMqHgDsd5OoYg/exec',

'Ветеран войны':
'https://script.google.com/macros/s/AKfycby6DIdWaptSqzKXMKt64d8C2Z-2-J4t7AcCITAp_b6nhjBddmW9sA0-d7TksOGCh8_h9Q/exec',

'Ветеран тыла':
'https://script.google.com/macros/s/AKfycbzOhCsOUoqS4d0fh7fTGynTBa_Zlru4_4spcYwanvmv-CEf79cvFzogZQaSD4duskyXbg/exec',

'Ребёнок войны':
'https://script.google.com/macros/s/AKfycbwESMxTWgah3GTL1RN3fXCpPcVtICSJb571kYROjRoQSVq0nYHvr6vzvc-14c4vOVIb/exec'

};

let currentPhoto = '';
let allData = [];

document
.getElementById('photo')
.addEventListener('change', e => {

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = ev => {

currentPhoto = ev.target.result;

document.getElementById('preview')
.innerHTML =
`<img src="${currentPhoto}">`;

};

reader.readAsDataURL(file);

});

async function saveVeteran(){

const category =
document.getElementById('category').value;

if(!category){
alert('Выберите категорию');
return;
}

const data = {

category:category,

lastName:
document.getElementById('lastName').value,

firstName:
document.getElementById('firstName').value,

middleName:
document.getElementById('middleName').value,

fullName:
`${document.getElementById('lastName').value}
${document.getElementById('firstName').value}
${document.getElementById('middleName').value}`,

representative:
document.getElementById('representative').value,

biography:
document.getElementById('biography').value,

photo:currentPhoto

};

await fetch(URLS[category],{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify(data)

});

alert('Сохранено');

location.reload();

}

function loadCategory(url){

return new Promise(resolve=>{

const callback =
'cb_' + Date.now();

window[callback] = data => {

resolve(data.list || []);

};

const script =
document.createElement('script');

script.src =
url + '?callback=' + callback;

document.body.appendChild(script);

});

}

async function loadAll(){

let result = [];

for(let key in URLS){

const arr =
await loadCategory(URLS[key]);

result = result.concat(arr);

}

allData = result.reverse();

render(allData);

}

function render(arr){

const list =
document.getElementById('list');

list.innerHTML = '';

arr.forEach(item=>{

list.innerHTML += `

<div class="card">

${
item.photoUrl
?
`<img src="${item.photoUrl}">`
:
''
}

<div class="info">

<div class="name">
${item.fullName || ''}
</div>

<div class="category">
${item.category || ''}
</div>

<div class="rep">
Представитель:
${item.representative || ''}
</div>

<div class="bio">
${item.biography || ''}
</div>

</div>

</div>

`;

});

}

function filterList(){

const q =
document.getElementById('search')
.value
.toLowerCase();

const filtered =
allData.filter(item =>

(item.fullName || '')
.toLowerCase()
.includes(q)

||

(item.biography || '')
.toLowerCase()
.includes(q)

);

render(filtered);

}

loadAll();

</script>

</body>
</html>
