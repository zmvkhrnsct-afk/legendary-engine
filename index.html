<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бессмертный полк | Любинский район</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #1a1e2c;
            color: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #ffd700;
        }

        input, select, textarea {
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 1rem;
        }

        button {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .veteran-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .veteran-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 1rem;
            border-left: 4px solid #ffd700;
        }

        .veteran-name {
            font-size: 1.25rem;
            font-weight: bold;
        }

        .veteran-category {
            font-size: 0.8rem;
            color: #ffd700;
            margin-top: 0.25rem;
        }

        .veteran-info {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        .search {
            margin-bottom: 1.5rem;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0f172a;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            border-left: 4px solid #ffd700;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Бессмертный полк Любинского района</h1>
            <p>Сохраним память вместе</p>
        </div>

        <div class="card">
            <h2>➕ Добавить ветерана</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Фамилия</label>
                    <input type="text" id="lastName" placeholder="Иванов">
                </div>
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="firstName" placeholder="Иван">
                </div>
                <div class="form-group">
                    <label>Отчество</label>
                    <input type="text" id="middleName" placeholder="Иванович">
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <select id="category">
                        <option value="">Выберите категорию</option>
                        <option value="Ветеран войны">Ветеран войны</option>
                        <option value="Ветеран тыла">Ветеран тыла</option>
                        <option value="Ребёнок войны">Ребёнок войны</option>
                        <option value="СВО">СВО</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ФИО представителя</label>
                    <input type="text" id="representative" placeholder="Петров П.П.">
                </div>
                <div class="form-group">
                    <label>Краткое описание биографии</label>
                    <textarea id="biography" rows="3" placeholder="Годы жизни, боевой путь, награды..."></textarea>
                </div>
                <button onclick="addVeteran()">📝 Сохранить память</button>
            </div>
        </div>

        <div class="search">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по фамилии, имени, биографии..." onkeyup="filterVeterans()">
        </div>

        <div id="veteranList" class="veteran-list">
            <div style="text-align: center;">Загрузка данных...</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ID таблиц Google Sheets (публичные)
        const SHEETS = {
            'Ветеран войны': '1-OnrHFAPWErVmV599WSEmVkdyPko2aZy266abJVsVMg',
            'Ветеран тыла': '1I_7fp0x4suK_jmrDnhP37rAdCLYJRSq6rauEfKZEg3Q',
            'Ребёнок войны': '1bD6JllvPqpwx1W-qCKxGBjYtXnVhfhp9Wt86vOir9sA',
            'СВО': '1VzCJ54lqfmwTMBJuKu2jJ9rLAwJodLi3QCV_q32y0qM'
        };

        // URL ваших скриптов (оставляем как есть)
        const SCRIPT_URLS = {
            'Ветеран войны': 'https://script.google.com/macros/s/AKfycby6DIdWaptSqzKXMKt64d8C2Z-2-J4t7AcCITAp_b6nhjBddmW9sA0-d7TksOGCh8_h9Q/exec',
            'Ветеран тыла': 'https://script.google.com/macros/s/AKfycbzOhCsOUoqS4d0fh7fTGynTBa_Zlru4_4spcYwanvmv-CEf79cvFzogZQaSD4duskyXbg/exec',
            'Ребёнок войны': 'https://script.google.com/macros/s/AKfycbwESMxTWgah3GTL1RN3fXCpPcVtICSJb571kYROjRoQSVq0nYHvr6vzvc-14c4vOVIb/exec',
            'СВО': 'https://script.google.com/macros/s/AKfycbwfGI1RDvsui963gRx5uEyZ1hvSH8XAwFr5MMycS3xrE0yR41wW2_vstFMqHgDsd5OoYg/exec'
        };

        let allVeterans = [];

        // Загрузка данных из всех таблиц
        async function loadAllVeterans() {
            allVeterans = [];
            for (const [category, sheetId] of Object.entries(SHEETS)) {
                await loadVeteransFromSheet(sheetId, category);
            }
            renderVeterans();
        }

        // Загрузка из одной таблицы через CSV
        async function loadVeteransFromSheet(sheetId, category) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
                const response = await fetch(url);
                const text = await response.text();
                const rows = text.split('\n');
                
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row.trim()) continue;
                    
                    // Парсим CSV с учётом кавычек
                    const cells = [];
                    let current = '';
                    let inQuotes = false;
                    
                    for (let j = 0; j < row.length; j++) {
                        const char = row[j];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            cells.push(current);
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    cells.push(current);
                    
                    if (cells.length < 9) continue;
                    
                    const veteran = {
                        fullName: cells[5] || '',
                        lastName: cells[2] || '',
                        firstName: cells[3] || '',
                        middleName: cells[4] || '',
                        category: category,
                        representative: cells[6] || 'Не указан',
                        biography: cells[7] || 'Нет описания',
                        date: cells[0] || ''
                    };
                    
                    if (veteran.fullName) {
                        allVeterans.push(veteran);
                    }
                }
            } catch (error) {
                console.error(`Ошибка загрузки ${category}:`, error);
            }
        }

        // Добавление ветерана
        async function addVeteran() {
            const lastName = document.getElementById('lastName').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const middleName = document.getElementById('middleName').value.trim();
            const category = document.getElementById('category').value;
            const representative = document.getElementById('representative').value.trim();
            const biography = document.getElementById('biography').value.trim();

            if (!lastName || !firstName || !category) {
                showToast('Заполните фамилию, имя и категорию', 'error');
                return;
            }

            const fullName = `${lastName} ${firstName} ${middleName}`.trim();
            
            // Проверка дубликата
            if (allVeterans.some(v => v.fullName === fullName)) {
                showToast('Этот ветеран уже есть в списке!', 'error');
                return;
            }

            const data = {
                action: 'add',
                fullName: fullName,
                lastName: lastName,
                firstName: firstName,
                middleName: middleName,
                category: category,
                representative: representative || 'Не указан',
                biography: biography || 'Нет описания',
                date: new Date().toISOString()
            };

            const url = SCRIPT_URLS[category];
            if (!url) {
                showToast('Ошибка: URL скрипта не найден', 'error');
                return;
            }

            showToast('Отправка данных...', 'info');

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                // При no-cors мы не можем прочитать ответ, но запрос уходит
                showToast('Ветеран добавлен!', 'success');
                
                // Добавляем в локальный список
                allVeterans.unshift({
                    fullName, lastName, firstName, middleName, category,
                    representative: representative || 'Не указан',
                    biography: biography || 'Нет описания',
                    date: new Date().toISOString()
                });
                
                renderVeterans();
                clearForm();
                
                // Ждём 2 секунды и перезагружаем данные
                setTimeout(() => {
                    loadAllVeterans();
                }, 2000);
                
            } catch (error) {
                console.error('Ошибка:', error);
                showToast('Ошибка отправки, но данные могли сохраниться', 'error');
            }
        }

        function clearForm() {
            document.getElementById('lastName').value = '';
            document.getElementById('firstName').value = '';
            document.getElementById('middleName').value = '';
            document.getElementById('category').value = '';
            document.getElementById('representative').value = '';
            document.getElementById('biography').value = '';
        }

        function renderVeterans() {
            const container = document.getElementById('veteranList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allVeterans;
            if (searchTerm) {
                filtered = allVeterans.filter(v => 
                    v.fullName.toLowerCase().includes(searchTerm) ||
                    v.biography.toLowerCase().includes(searchTerm)
                );
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center;">Пока никого нет. Будьте первым!</div>';
                return;
            }
            
            container.innerHTML = filtered.map(v => `
                <div class="veteran-card">
                    <div class="veteran-name">${escapeHtml(v.fullName)}</div>
                    <div class="veteran-category">${escapeHtml(v.category)}</div>
                    <div class="veteran-info">
                        <div>👤 Представитель: ${escapeHtml(v.representative)}</div>
                        <div>📖 ${escapeHtml(v.biography.substring(0, 150))}${v.biography.length > 150 ? '...' : ''}</div>
                    </div>
                </div>
            `).join('');
        }

        function filterVeterans() {
            renderVeterans();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Загружаем данные
        loadAllVeterans();
    </script>
</body>
</html>
