<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Бессмертный полк | Любинский район</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background-color: #07090e; color: #f0f2f5; background-image: url("https://avatars.mds.yandex.net/get-altay/2786941/2a000001764d11b85db4b67e6762ddc3d31b/XXL_height"); background-size: cover; background-position: center 25%; background-attachment: fixed; position: relative; }
  body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at 30% 20%, rgba(0,0,0,0.65), rgba(0,0,0,0.85)); backdrop-filter: blur(3px); z-index: -2; }
  .header { text-align: center; padding: 2rem 1rem 1.5rem; border-bottom: 1px solid rgba(255,215,0,0.3); background: rgba(5,7,12,0.55); backdrop-filter: blur(10px); }
  .header h1 { font-size: clamp(1.6rem, 6vw, 2.3rem); background: linear-gradient(135deg, #FFE5A3, #F9B81B); background-clip: text; -webkit-background-clip: text; color: transparent; }
  .header p { font-size: clamp(0.8rem, 3.5vw, 1rem); color: #e8debc; margin-top: 8px; }
  .container { max-width: 1350px; margin: 0 auto; display: flex; justify-content: center; gap: 28px; padding: 30px 24px 50px; flex-wrap: wrap; }
  .form-box, .list-box { flex: 1 1 480px; min-width: 280px; max-width: 560px; background: rgba(12,15,24,0.85); backdrop-filter: blur(14px); border-radius: 36px; padding: 26px 24px 32px; border: 1px solid rgba(255,215,0,0.35); transition: 0.25s; }
  .form-box:hover, .list-box:hover { border-color: rgba(255,215,0,0.7); background: rgba(12,15,24,0.92); transform: translateY(-3px); }
  .form-box h3, .list-box h3 { font-size: 1.65rem; margin-bottom: 1.6rem; color: #FFE3A4; border-left: 4px solid #F9B81B; padding-left: 18px; }
  .form-box h3 i, .list-box h3 i { color: #F9B81B; margin-right: 10px; }
  .form-grid { display: grid; gap: 14px; }
  .input-field { display: flex; flex-direction: column; gap: 6px; }
  .input-field label { font-size: 0.8rem; color: #e0d5bc; margin-left: 6px; }
  .input-field label i { margin-right: 6px; color: #F9B81B; }
  input, select, textarea { width: 100%; padding: 12px 14px; background: rgba(3,5,12,0.7); border: 1px solid #404452; border-radius: 28px; font-size: 0.9rem; color: #f5f0e3; outline: none; }
  textarea { border-radius: 22px; resize: vertical; min-height: 80px; }
  input:focus, select:focus, textarea:focus { border-color: #F9B81B; box-shadow: 0 0 0 3px rgba(249,184,27,0.2); }
  .photo-preview { margin-top: 8px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .photo-preview img { width: 60px; height: 60px; object-fit: cover; border-radius: 16px; border: 2px solid #F9B81B; }
  .file-input-label { background: rgba(249,184,27,0.18); padding: 8px 16px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; border: 1px solid rgba(249,184,27,0.5); display: inline-flex; align-items: center; gap: 8px; }
  button { width: 100%; padding: 12px; border: none; border-radius: 44px; background: linear-gradient(105deg, #F9B81B, #E6A017); font-weight: 700; font-size: 1rem; cursor: pointer; color: #1f1a08; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
  button:hover { transform: scale(0.98); background: linear-gradient(105deg, #FFCF54, #F9B81B); }
  .search { width: 100%; padding: 12px 18px; border-radius: 60px; background: #0a0e18cc; border: 1px solid #5f5a4a; color: white; margin-bottom: 20px; }
  .list-container { max-height: 540px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .list-container::-webkit-scrollbar { width: 5px; }
  .list-container::-webkit-scrollbar-track { background: #262833; border-radius: 10px; }
  .list-container::-webkit-scrollbar-thumb { background: #F9B81B; border-radius: 10px; }
  .veteran-card { background: rgba(23,26,38,0.8); border-radius: 28px; padding: 14px 16px; border: 1px solid rgba(255,215,0,0.25); display: flex; gap: 14px; cursor: pointer; transition: 0.2s; }
  .veteran-card:hover { background: rgba(32,36,52,0.95); border-color: rgba(255,215,0,0.6); transform: translateX(5px); }
  .veteran-photo { flex-shrink: 0; width: 72px; height: 72px; border-radius: 18px; overflow: hidden; background: #1e212e; border: 2px solid #F9B81B; }
  .veteran-photo img { width: 100%; height: 100%; object-fit: cover; }
  .veteran-info { flex: 1; }
  .veteran-name { font-size: 1rem; font-weight: 700; color: #FFE9B6; display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 6px; }
  .veteran-category { font-size: 0.65rem; background: rgba(249,184,27,0.25); padding: 3px 10px; border-radius: 30px; color: #F9B81B; }
  .representative { font-size: 0.72rem; color: #cfc8b2; margin: 4px 0; }
  .representative i { margin-right: 5px; color: #F9B81B; }
  .bio-short { font-size: 0.73rem; color: #d9d0b5; margin-top: 5px; padding-top: 5px; border-top: 1px dashed rgba(255,215,0,0.2); }
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; justify-content: center; align-items: center; cursor: pointer; }
  .modal.active { display: flex; }
  .modal img { max-width: 90%; max-height: 90%; border-radius: 24px; border: 3px solid #F9B81B; }
  .toast { position: fixed; bottom: 28px; right: 20px; background: #1e202ccc; backdrop-filter: blur(16px); padding: 12px 22px; border-radius: 50px; border-left: 5px solid gold; font-size: 0.85rem; opacity: 0; transform: translateY(20px); transition: 0.25s; z-index: 1000; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-left-color: #ff6b6b; }
  .toast.success { border-left-color: #7ddf9a; }
  @media (max-width: 780px) { .container { padding: 20px 16px; gap: 24px; } .form-box, .list-box { padding: 20px 18px 26px; } .veteran-photo { width: 60px; height: 60px; } .veteran-name { font-size: 0.9rem; } }
  .loading { text-align: center; padding: 40px; }
  .empty-list { text-align: center; padding: 40px 20px; opacity: 0.7; }
</style>
</head>
<body>

<div class="header">
  <h1><i class="fas fa-star-of-life"></i> БЕССМЕРТНЫЙ ПОЛК<br>ЛЮБИНСКОГО РАЙОНА</h1>
  <p>Истории, лица, память поколений</p>
</div>

<div class="container">
  <div class="form-box">
    <h3><i class="fas fa-user-plus"></i> Добавить ветерана</h3>
    <div class="form-grid">
      <div class="input-field"><label><i class="fas fa-user-tag"></i> Фамилия</label><input id="lastName" placeholder="Фамилия"></div>
      <div class="input-field"><label><i class="fas fa-user"></i> Имя</label><input id="firstName" placeholder="Имя"></div>
      <div class="input-field"><label><i class="fas fa-user-circle"></i> Отчество</label><input id="middleName" placeholder="Отчество"></div>
      <div class="input-field">
        <label><i class="fas fa-tags"></i> Категория</label>
        <select id="category">
          <option value="">Выберите категорию</option>
          <option>Ветеран войны</option>
          <option>Ветеран тыла</option>
          <option>Ребёнок войны</option>
          <option>СВО</option>
        </select>
      </div>
      <div class="input-field"><label><i class="fas fa-user-friends"></i> ФИО представителя</label><input id="representative" placeholder="Кто вносит данные"></div>
      <div class="input-field"><label><i class="fas fa-feather-alt"></i> Биография</label><textarea id="biography" placeholder="Годы жизни, боевой путь, награды..."></textarea></div>
      <div class="input-field">
        <label><i class="fas fa-camera"></i> Фото</label>
        <input type="file" id="photoInput" accept="image/*" style="display:none;">
        <div class="photo-preview">
          <div class="file-input-label" onclick="document.getElementById('photoInput').click()"><i class="fas fa-upload"></i> Загрузить фото</div>
          <div id="photoPreview"></div>
        </div>
      </div>
      <button onclick="submitForm()"><i class="fas fa-save"></i> Сохранить память</button>
    </div>
  </div>

  <div class="list-box">
    <h3><i class="fas fa-memory"></i> Стена памяти</h3>
    <input class="search" id="searchInput" placeholder="Поиск по имени, биографии..." oninput="filterList(this.value)">
    <div id="list" class="list-container"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div id="photoModal" class="modal" onclick="closeModal()"><img id="modalImage" src=""></div>

<script>
  // ============ ПРЯМЫЕ ССЫЛКИ НА CSV (из ваших pubhtml) ============
  const CSV_URLS = {
    'Ветеран войны': 'https://docs.google.com/spreadsheets/d/1-OnrHFAPWErVmV599WSEmVkdyPko2aZy266abJVsVMg/edit?gid=0#gid=0',
    'Ветеран тыла': 'https://docs.google.com/spreadsheets/d/1I_7fp0x4suK_jmrDnhP37rAdCLYJRSq6rauEfKZEg3Q/edit?gid=0#gid=0',
    'Ребёнок войны': 'https://docs.google.com/spreadsheets/d/1bD6JllvPqpwx1W-qCKxGBjYtXnVhfhp9Wt86vOir9sA/edit?gid=0#gid=0',
    'СВО': 'https://docs.google.com/spreadsheets/d/1VzCJ54lqfmwTMBJuKu2jJ9rLAwJodLi3QCV_q32y0qM/edit?gid=0#gid=0'
  };

  // URL скриптов для отправки (те же, что были)
  const SCRIPT_URLS = {
    'Ветеран войны': 'https://script.google.com/macros/s/AKfycby6DIdWaptSqzKXMKt64d8C2Z-2-J4t7AcCITAp_b6nhjBddmW9sA0-d7TksOGCh8_h9Q/exec',
    'Ветеран тыла': 'https://script.google.com/macros/s/AKfycbzOhCsOUoqS4d0fh7fTGynTBa_Zlru4_4spcYwanvmv-CEf79cvFzogZQaSD4duskyXbg/exec',
    'Ребёнок войны': 'https://script.google.com/macros/s/AKfycbwESMxTWgah3GTL1RN3fXCpPcVtICSJb571kYROjRoQSVq0nYHvr6vzvc-14c4vOVIb/exec',
    'СВО': 'https://script.google.com/macros/s/AKfycbwfGI1RDvsui963gRx5uEyZ1hvSH8XAwFr5MMycS3xrE0yR41wW2_vstFMqHgDsd5OoYg/exec'
  };

  let allVeterans = [], filteredVeterans = [], currentPhotoBase64 = null;

  // === ЗАГРУЗКА CSV ===
  async function loadCSV(url, category) {
    try {
      const resp = await fetch(url);
      const text = await resp.text();
      const lines = text.split('\n');
      const result = [];
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        // Простой парсинг CSV с учётом кавычек
        const cells = [];
        let cur = '', quotes = false;
        for (let ch of line) {
          if (ch === '"') quotes = !quotes;
          else if (ch === ',' && !quotes) { cells.push(cur); cur = ''; }
          else cur += ch;
        }
        cells.push(cur);
        if (cells.length < 6) continue;
        result.push({
          date: cells[0] || '',
          category: category,
          lastName: cells[2] || '',
          firstName: cells[3] || '',
          middleName: cells[4] || '',
          fullName: cells[5] || '',
          representative: cells[6] || 'Не указан',
          biography: cells[7] || 'Нет описания',
          photoUrl: cells[8] || ''
        });
      }
      return result;
    } catch(e) {
      console.warn(`Ошибка загрузки ${category}:`, e);
      return [];
    }
  }

  async function loadAllData() {
    showToast('Загрузка данных...', 'success');
    const promises = Object.entries(CSV_URLS).map(([cat, url]) => loadCSV(url, cat));
    const results = await Promise.all(promises);
    let combined = [];
    results.forEach(arr => { if (arr.length) combined.push(...arr); });
    combined.sort((a,b) => new Date(b.date) - new Date(a.date));
    allVeterans = combined;
    filteredVeterans = [...allVeterans];
    renderList();
    showToast(`Загружено ${allVeterans.length} записей`, 'success');
  }

  // === ОТПРАВКА ЧЕРЕЗ ФОРМУ (БЕЗ CORS) ===
  function submitForm() {
    const lastName = document.getElementById('lastName').value.trim();
    const firstName = document.getElementById('firstName').value.trim();
    const middleName = document.getElementById('middleName').value.trim();
    const category = document.getElementById('category').value;
    const representative = document.getElementById('representative').value.trim();
    const biography = document.getElementById('biography').value.trim();

    if (!lastName || !firstName || !category) {
      showToast('Заполните фамилию, имя и категорию', 'error');
      return;
    }
    const fullName = `${lastName} ${firstName} ${middleName}`.trim().replace(/\s+/g, ' ');
    if (allVeterans.some(v => v.fullName === fullName)) {
      showToast('Этот ветеран уже есть!', 'error');
      return;
    }
    const url = SCRIPT_URLS[category];
    if (!url) { showToast('Ошибка: URL скрипта', 'error'); return; }

    // Создаём форму и отправляем
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = url;
    form.target = 'hidden_iframe';
    form.style.display = 'none';
    form.enctype = 'multipart/form-data';  // важно для файлов

    const fields = {
      action: 'add',
      fullName, lastName, firstName, middleName: middleName || '',
      category,
      representative: representative || 'Не указан',
      biography: biography || 'Нет описания',
      photo: currentPhotoBase64 || '',
      date: new Date().toISOString()
    };
    for (const [k, v] of Object.entries(fields)) {
      const inp = document.createElement('input');
      inp.type = 'hidden';
      inp.name = k;
      inp.value = v;
      form.appendChild(inp);
    }

    let iframe = document.getElementById('hidden_iframe');
    if (!iframe) {
      iframe = document.createElement('iframe');
      iframe.name = 'hidden_iframe';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
    }
    iframe.onload = () => {
      showToast('Ветеран добавлен!', 'success');
      // Добавляем в локальный кеш
      allVeterans.unshift({
        fullName, lastName, firstName, middleName, category,
        representative: representative || 'Не указан',
        biography: biography || 'Нет описания',
        photoUrl: currentPhotoBase64 || null,
        date: new Date().toISOString()
      });
      filteredVeterans = [...allVeterans];
      renderList();
      clearForm();
    };
    document.body.appendChild(form);
    form.submit();
    setTimeout(() => form.remove(), 1000);
  }

  function clearForm() {
    ['lastName','firstName','middleName','representative','biography','category','photoInput'].forEach(id => {
      const el = document.getElementById(id);
      if (el && el.type !== 'file') el.value = '';
      else if (el && el.type === 'file') el.value = '';
    });
    document.getElementById('photoPreview').innerHTML = '';
    currentPhotoBase64 = null;
  }

  function handlePhotoUpload() {
    const file = document.getElementById('photoInput').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      currentPhotoBase64 = e.target.result;
      document.getElementById('photoPreview').innerHTML = `<img src="${currentPhotoBase64}">`;
    };
    reader.readAsDataURL(file);
  }
  document.getElementById('photoInput').addEventListener('change', handlePhotoUpload);

  function renderList() {
    const container = document.getElementById('list');
    if (!filteredVeterans.length) {
      container.innerHTML = '<div class="empty-list"><i class="fas fa-tree"></i> Пока никого нет. Будьте первым!</div>';
      return;
    }
    container.innerHTML = filteredVeterans.slice(0, 150).map(item => `
      <div class="veteran-card" onclick="openModal('${item.photoUrl || ''}')">
        <div class="veteran-photo">${item.photoUrl ? `<img src="${item.photoUrl}">` : '<div style="height:100%;display:flex;align-items:center;justify-content:center;"><i class="fas fa-user-circle"></i></div>'}</div>
        <div class="veteran-info">
          <div class="veteran-name"><span><i class="fas fa-medal"></i> ${escapeHtml(item.fullName)}</span><span class="veteran-category">${escapeHtml(item.category)}</span></div>
          <div class="representative"><i class="fas fa-user-check"></i> ${escapeHtml(item.representative)}</div>
          <div class="bio-short"><i class="fas fa-book-open"></i> ${escapeHtml((item.biography || 'Нет описания').substring(0, 110))}</div>
        </div>
      </div>
    `).join('');
  }

  function filterList(q) {
    const lower = q.toLowerCase();
    filteredVeterans = lower ? allVeterans.filter(v => 
      (v.fullName+'').toLowerCase().includes(lower) ||
      (v.biography+'').toLowerCase().includes(lower) ||
      (v.representative+'').toLowerCase().includes(lower)
    ) : [...allVeterans];
    renderList();
  }

  function openModal(url) { if (url) { document.getElementById('modalImage').src = url; document.getElementById('photoModal').classList.add('active'); } }
  function closeModal() { document.getElementById('photoModal').classList.remove('active'); }
  function escapeHtml(s) { return (s||'').replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
  function showToast(msg, type) { const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast show ${type}`; setTimeout(() => t.classList.remove('show'), 3000); }

  window.submitForm = submitForm;
  window.filterList = filterList;
  window.openModal = openModal;
  window.closeModal = closeModal;

  loadAllData();
</script>
</body>
</html>
