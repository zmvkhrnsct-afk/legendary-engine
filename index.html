<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Форма добавления</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      width: 320px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0056b3;
    }

    .status {
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
    }

    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>

<div class="form-container">
  <h2>Добавить запись</h2>

  <form id="form">
    <input type="text" id="lastName" placeholder="Фамилия" required>
    <input type="text" id="firstName" placeholder="Имя" required>
    <input type="text" id="middleName" placeholder="Отчество">

    <select id="category" required>
      <option value="">Выберите категорию</option>
      <option>Ребёнок войны</option>
      <option>Ветеран войны</option>
      <option>Ветеран тыла</option>
      <option>СВО</option>
    </select>

    <button type="submit">Отправить</button>
  </form>

  <div id="status" class="status"></div>
</div>

<script>
document.getElementById('form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const statusDiv = document.getElementById('status');

  const lastName = document.getElementById('lastName').value.trim();
  const firstName = document.getElementById('firstName').value.trim();
  const middleName = document.getElementById('middleName').value.trim();
  const category = document.getElementById('category').value;

  const fullName = `${lastName} ${firstName} ${middleName}`.trim();

  // ✅ Валидация
  if (!lastName || !firstName || !category) {
    showStatus('Заполните обязательные поля', 'error');
    return;
  }

  const data = {
    lastName,
    firstName,
    middleName,
    fullName,
    category
  };

  // 🔗 URL таблиц
  const urlMap = {
    'Ребёнок войны': 'https://script.google.com/macros/s/AKfycbxgyg865P5c7mtVeNSRZMvxPStSdAwNYK0EisMVX2k8YRcnTbOTJ79PI_sRpKqOM8GZ/exec',
    'Ветеран войны': 'https://script.google.com/macros/s/AKfycbyI3-QrWBm9seT2ji1Zfe_u77t8H1ZT8T1dVWy9C7e324Y1M25_wr6DfxbKVkUYqAwolQ/exec',
    'Ветеран тыла': 'https://script.google.com/macros/s/AKfycbxbtn_p8-9oHT7p1mU7sVpOxxp7WZr4lsRHAB78-r3D7kKp_CiHZisvvVZxxpdg1d3fHA/exec',
    'СВО': 'https://script.google.com/macros/s/AKfycbwMnOZr5m0YAC8gsjTrWFc_udAeIS9VL8XpPSulj5LwXaP29-Iw3xughRv8lcyUjXFMzw/exec'
  };

  const url = urlMap[category];

  if (!url) {
    showStatus('Ошибка категории', 'error');
    return;
  }

  try {
    showStatus('Отправка...', '');

    const response = await fetch(url, {
      method: 'POST',
      body: JSON.stringify(data),
      headers: {
        'Content-Type': 'application/json'
      }
    });

    const result = await response.json();

    if (result.result === 'success') {
      showStatus('Успешно отправлено ✅', 'success');
      document.getElementById('form').reset();
    } else {
      showStatus(result.message || 'Ошибка', 'error');
    }

  } catch (error) {
    console.error(error);
    showStatus('Ошибка соединения', 'error');
  }
});

function showStatus(message, type) {
  const statusDiv = document.getElementById('status');
  statusDiv.textContent = message;
  statusDiv.className = 'status ' + type;
}
</script>

</body>
</html>
