<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Бессмертный полк | Единая стена памяти</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background-color: #07090e;
    color: #f0f2f5;
    background-image: url("https://avatars.mds.yandex.net/get-altay/2786941/2a000001764d11b85db4b67e6762ddc3d31b/XXL_height");
    background-size: cover;
    background-position: center 25%;
    background-attachment: fixed;
    background-repeat: no-repeat;
    position: relative;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(0,0,0,0.55), rgba(0,0,0,0.78));
    backdrop-filter: blur(3px);
    z-index: -2;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 70% 80%, rgba(255,215,0,0.05), transparent 70%);
    pointer-events: none;
    z-index: -1;
  }
  .header {
    text-align: center;
    padding: 2rem 1rem 1.5rem;
    border-bottom: 1px solid rgba(255, 215, 0, 0.3);
    background: rgba(5, 7, 12, 0.55);
    backdrop-filter: blur(10px);
    margin-bottom: 0.5rem;
  }
  .header h1 {
    font-size: clamp(1.6rem, 6vw, 2.3rem);
    background: linear-gradient(135deg, #FFE5A3, #F9B81B);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    font-weight: 700;
  }
  .header p { font-size: clamp(0.8rem, 3.5vw, 1rem); color: #e8debc; margin-top: 8px; }
  .container {
    max-width: 1350px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 30px 24px 50px;
    flex-wrap: wrap;
  }
  .form-box, .list-box {
    flex: 1 1 480px;
    min-width: 280px;
    max-width: 560px;
    background: rgba(12, 15, 24, 0.78);
    backdrop-filter: blur(14px);
    border-radius: 36px;
    padding: 26px 24px 32px;
    border: 1px solid rgba(255, 215, 0, 0.35);
    transition: all 0.25s ease;
  }
  .form-box:hover, .list-box:hover {
    border-color: rgba(255, 215, 0, 0.7);
    background: rgba(12, 15, 24, 0.86);
    transform: translateY(-3px);
  }
  .form-box h3, .list-box h3 {
    font-size: 1.65rem;
    font-weight: 600;
    margin-bottom: 1.6rem;
    color: #FFE3A4;
    border-left: 4px solid #F9B81B;
    padding-left: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .form-box h3 i, .list-box h3 i { font-size: 1.5rem; color: #F9B81B; }
  .form-grid { display: grid; gap: 14px; }
  .input-field { display: flex; flex-direction: column; gap: 6px; }
  .input-field label {
    font-size: 0.8rem;
    font-weight: 500;
    color: #e0d5bc;
    margin-left: 6px;
  }
  .input-field label i { margin-right: 6px; color: #F9B81B; font-size: 0.75rem; }
  input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    background: rgba(3, 5, 12, 0.7);
    border: 1px solid #404452;
    border-radius: 28px;
    font-size: 0.9rem;
    color: #f5f0e3;
    font-family: 'Inter', sans-serif;
    outline: none;
  }
  textarea { border-radius: 22px; resize: vertical; min-height: 80px; }
  input:focus, select:focus, textarea:focus {
    border-color: #F9B81B;
    box-shadow: 0 0 0 3px rgba(249,184,27,0.2);
    background: rgba(8, 11, 20, 0.9);
  }
  .photo-preview { margin-top: 8px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .photo-preview img { width: 60px; height: 60px; object-fit: cover; border-radius: 16px; border: 2px solid #F9B81B; background: #1f1e2a; }
  .file-input-label {
    background: rgba(249, 184, 27, 0.18);
    padding: 8px 16px;
    border-radius: 40px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
    border: 1px solid rgba(249,184,27,0.5);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .file-input-label:hover { background: rgba(249, 184, 27, 0.35); border-color: #F9B81B; }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 44px;
    background: linear-gradient(105deg, #F9B81B, #E6A017);
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    color: #1f1a08;
    transition: 0.2s;
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  button:hover { background: linear-gradient(105deg, #FFCF54, #F9B81B); transform: scale(0.98); }
  .search-area { margin-bottom: 22px; }
  .search {
    width: 100%;
    padding: 12px 18px;
    border-radius: 60px;
    background: #0a0e18cc;
    border: 1px solid #5f5a4a;
    color: white;
    font-size: 0.9rem;
  }
  .list-container { max-height: 540px; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 14px; }
  .list-container::-webkit-scrollbar { width: 5px; }
  .list-container::-webkit-scrollbar-track { background: #262833; border-radius: 10px; }
  .list-container::-webkit-scrollbar-thumb { background: #F9B81B; border-radius: 10px; }
  .veteran-card {
    background: rgba(23, 26, 38, 0.8);
    backdrop-filter: blur(4px);
    border-radius: 28px;
    padding: 14px 16px;
    border: 1px solid rgba(255,215,0,0.25);
    display: flex;
    gap: 14px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .veteran-card:hover { background: rgba(32, 36, 52, 0.92); border-color: rgba(255,215,0,0.6); transform: translateX(5px); }
  .veteran-photo { flex-shrink: 0; width: 72px; height: 72px; border-radius: 18px; overflow: hidden; background: #1e212e; border: 2px solid #F9B81B; }
  .veteran-photo img { width: 100%; height: 100%; object-fit: cover; }
  .veteran-info { flex: 1; }
  .veteran-name { font-size: 1rem; font-weight: 700; color: #FFE9B6; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .veteran-category { font-size: 0.65rem; background: rgba(249, 184, 27, 0.25); padding: 3px 10px; border-radius: 30px; color: #F9B81B; font-weight: 500; white-space: nowrap; }
  .representative { font-size: 0.72rem; color: #cfc8b2; margin: 4px 0; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .representative i { font-size: 0.7rem; color: #F9B81B; width: 18px; }
  .bio-short { font-size: 0.73rem; line-height: 1.35; color: #d9d0b5; margin-top: 5px; padding-top: 5px; border-top: 1px dashed rgba(255,215,0,0.2); }
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; cursor: pointer; }
  .modal.active { display: flex; }
  .modal img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 24px; border: 3px solid #F9B81B; }
  .toast {
    position: fixed;
    bottom: 28px;
    right: 20px;
    background: #1e202ccc;
    backdrop-filter: blur(16px);
    padding: 12px 22px;
    border-radius: 50px;
    border-left: 5px solid gold;
    font-weight: 500;
    font-size: 0.85rem;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.25s;
    z-index: 1000;
    pointer-events: none;
    color: #f0ebdd;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-left-color: #ff6b6b; background: #2e1919cc; }
  .toast.success { border-left-color: #7ddf9a; }
  @media (max-width: 780px) {
    .container { padding: 20px 16px 40px; gap: 24px; }
    .form-box, .list-box { flex: 1 1 100%; max-width: 100%; padding: 20px 18px 26px; border-radius: 32px; }
    .form-box h3, .list-box h3 { font-size: 1.4rem; margin-bottom: 1.2rem; padding-left: 12px; }
    .veteran-card { padding: 12px; gap: 12px; }
    .veteran-photo { width: 60px; height: 60px; border-radius: 14px; }
    .veteran-name { font-size: 0.9rem; }
    .representative, .bio-short { font-size: 0.68rem; }
    .header { padding: 1.2rem 0.8rem; }
    input, select, textarea, .search { padding: 10px 14px; font-size: 0.85rem; }
    button { padding: 10px; font-size: 0.9rem; }
    .list-container { max-height: 480px; }
  }
  @media (max-width: 480px) {
    .form-box, .list-box { padding: 16px 14px 22px; border-radius: 28px; }
    .veteran-photo { width: 52px; height: 52px; }
    .veteran-name { font-size: 0.85rem; }
    .form-box h3, .list-box h3 { font-size: 1.25rem; }
  }
  .empty-list { text-align: center; padding: 40px 20px; opacity: 0.8; font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <h1><i class="fas fa-star-of-life"></i> БЕССМЕРТНЫЙ ПОЛК <br> ЛЮБИНСКОГО РАЙОНА</h1>
  <p>Истории, лица, память поколений</p>
</div>

<div class="container">
  <div class="form-box">
    <h3><i class="fas fa-user-plus"></i> Добавить ветерана</h3>
    <div class="form-grid">
      <div class="input-field"><label><i class="fas fa-user-tag"></i> Фамилия</label><input id="lastName" placeholder="Фамилия"></div>
      <div class="input-field"><label><i class="fas fa-user"></i> Имя</label><input id="firstName" placeholder="Имя"></div>
      <div class="input-field"><label><i class="fas fa-user-circle"></i> Отчество</label><input id="middleName" placeholder="Отчество"></div>
      <div class="input-field">
        <label><i class="fas fa-tags"></i> Категория</label>
        <select id="category">
          <option value="">Выберите категорию</option>
          <option>Ветеран войны</option>
          <option>Ветеран тыла</option>
          <option>Ребёнок войны</option>
          <option>СВО</option>
        </select>
      </div>
      <div class="input-field"><label><i class="fas fa-user-friends"></i> ФИО представителя</label><input id="representative" placeholder="Кто вносит данные"></div>
      <div class="input-field"><label><i class="fas fa-feather-alt"></i> Краткое описание биографии</label><textarea id="biography" placeholder="Годы жизни, боевой путь, награды, воспоминания..."></textarea></div>
      <div class="input-field">
        <label><i class="fas fa-camera"></i> Фотография ветерана</label>
        <input type="file" id="photoInput" accept="image/jpeg,image/png,image/jpg" style="display:none;">
        <div class="photo-preview">
          <div class="file-input-label" onclick="document.getElementById('photoInput').click()"><i class="fas fa-upload"></i> Загрузить фото</div>
          <div id="photoPreview"></div>
        </div>
      </div>
      <button onclick="submitForm()"><i class="fas fa-save"></i> Сохранить память</button>
    </div>
  </div>

  <div class="list-box">
    <h3><i class="fas fa-memory"></i> Стена памяти</h3>
    <div class="search-area"><input class="search" id="searchInput" placeholder="Поиск по имени, биографии, представителю..." oninput="filterList(this.value)"></div>
    <div id="list" class="list-container">Загрузка...</div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div id="photoModal" class="modal" onclick="closeModal()"><img id="modalImage" src=""></div>

<script>
  // URL ваших скриптов
  const SCRIPT_URLS = {
    'Ветеран войны': 'https://script.google.com/macros/s/AKfycby6DIdWaptSqzKXMKt64d8C2Z-2-J4t7AcCITAp_b6nhjBddmW9sA0-d7TksOGCh8_h9Q/exec',
    'Ветеран тыла': 'https://script.google.com/macros/s/AKfycbzOhCsOUoqS4d0fh7fTGynTBa_Zlru4_4spcYwanvmv-CEf79cvFzogZQaSD4duskyXbg/exec',
    'Ребёнок войны': 'https://script.google.com/macros/s/AKfycbwESMxTWgah3GTL1RN3fXCpPcVtICSJb571kYROjRoQSVq0nYHvr6vzvc-14c4vOVIb/exec',
    'СВО': 'https://script.google.com/macros/s/AKfycbwfGI1RDvsui963gRx5uEyZ1hvSH8XAwFr5MMycS3xrE0yR41wW2_vstFMqHgDsd5OoYg/exec'
  };
  
  let cache = [];
  let filtered = [];
  let currentPhotoBase64 = null;

  function handlePhotoUpload() {
    const file = document.getElementById('photoInput').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      currentPhotoBase64 = e.target.result;
      document.getElementById('photoPreview').innerHTML = `<img src="${currentPhotoBase64}">`;
    };
    reader.readAsDataURL(file);
  }
  document.getElementById('photoInput').addEventListener('change', handlePhotoUpload);

  // === ОБХОД CORS: используем JSONP через скрытый iframe ===
  function sendToGoogleScript(url, data, callback) {
    const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
    window[callbackName] = function(response) {
      delete window[callbackName];
      document.body.removeChild(script);
      if (callback) callback(response);
    };
    
    const params = new URLSearchParams();
    params.append('callback', callbackName);
    params.append('data', JSON.stringify(data));
    
    const script = document.createElement('script');
    script.src = url + '?callback=' + callbackName + '&data=' + encodeURIComponent(JSON.stringify(data));
    script.onerror = function() {
      delete window[callbackName];
      document.body.removeChild(script);
      if (callback) callback({ result: 'error', message: 'Ошибка соединения' });
    };
    document.body.appendChild(script);
  }

  // Загрузка данных через JSONP
  function fetchCategoryData(category, url) {
    return new Promise((resolve) => {
      const callbackName = 'load_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
      window[callbackName] = function(response) {
        delete window[callbackName];
        if (response && response.result === 'success' && Array.isArray(response.list)) {
          resolve(response.list.map(item => ({ ...item, category: item.category || category })));
        } else {
          resolve([]);
        }
      };
      
      const script = document.createElement('script');
      script.src = url + '?callback=' + callbackName + '&action=get&category=' + encodeURIComponent(category);
      script.onerror = () => { delete window[callbackName]; resolve([]); };
      document.body.appendChild(script);
      
      setTimeout(() => { if (window[callbackName]) { delete window[callbackName]; resolve([]); } }, 10000);
    });
  }

  async function loadAllVeterans() {
    const promises = [];
    for (const [category, url] of Object.entries(SCRIPT_URLS)) {
      promises.push(fetchCategoryData(category, url));
    }
    const results = await Promise.all(promises);
    let combined = [];
    results.forEach(arr => { if (arr.length) combined.push(...arr); });
    
    const uniqueMap = new Map();
    for (const item of combined) {
      const key = item.fullName;
      if (!key) continue;
      if (!uniqueMap.has(key) || new Date(item.date) > new Date(uniqueMap.get(key).date)) {
        uniqueMap.set(key, item);
      }
    }
    cache = Array.from(uniqueMap.values());
    cache.sort((a, b) => new Date(b.date || b.timestamp) - new Date(a.date || a.timestamp));
    filtered = [...cache];
    render();
  }

  // Отправка через iframe (обходит CORS)
  function submitViaIframe(url, data) {
    return new Promise((resolve) => {
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = url;
      form.target = 'hidden_frame_' + Date.now();
      
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'data';
      input.value = JSON.stringify(data);
      form.appendChild(input);
      
      iframe.name = form.target;
      iframe.onload = function() {
        setTimeout(() => {
          document.body.removeChild(iframe);
          resolve({ result: 'success' });
        }, 500);
      };
      
      document.body.appendChild(iframe);
      document.body.appendChild(form);
      form.submit();
      setTimeout(() => {
        if (document.body.contains(form)) document.body.removeChild(form);
      }, 1000);
    });
  }

  async function submitForm() {
    const lastName = document.getElementById('lastName').value.trim();
    const firstName = document.getElementById('firstName').value.trim();
    const middleName = document.getElementById('middleName').value.trim();
    const category = document.getElementById('category').value;
    const representative = document.getElementById('representative').value.trim();
    const biography = document.getElementById('biography').value.trim();

    if (!lastName || !firstName || !category) {
      toast('Заполните фамилию, имя и категорию', 'error');
      return;
    }
    
    const fullName = `${lastName} ${firstName} ${middleName}`.trim().replace(/\s+/g, ' ');
    
    if (cache.some(x => x.fullName && x.fullName.toLowerCase() === fullName.toLowerCase())) {
      toast('Этот ветеран уже увековечен на Стене памяти', 'error');
      return;
    }

    const requestData = {
      action: 'add',
      date: new Date().toISOString(),
      fullName: fullName,
      lastName: lastName,
      firstName: firstName,
      middleName: middleName || '',
      category: category,
      representative: representative || 'Не указан',
      biography: biography || 'Нет описания',
      photo: currentPhotoBase64 || null
    };

    const url = SCRIPT_URLS[category];
    if (!url) { toast('Ошибка: категория не найдена', 'error'); return; }

    toast('Отправка данных...', 'success');
    
    try {
      await submitViaIframe(url, requestData);
      
      toast('Ветеран успешно добавлен!', 'success');
      
      const newVeteran = {
        fullName: fullName,
        lastName: lastName,
        firstName: firstName,
        middleName: middleName,
        category: category,
        representative: representative || 'Не указан',
        biography: biography || 'Нет описания',
        photoUrl: currentPhotoBase64 || null,
        date: new Date().toISOString()
      };
      cache.unshift(newVeteran);
      filtered = [...cache];
      render();
      
      document.getElementById('lastName').value = '';
      document.getElementById('firstName').value = '';
      document.getElementById('middleName').value = '';
      document.getElementById('representative').value = '';
      document.getElementById('biography').value = '';
      document.getElementById('category').value = '';
      document.getElementById('photoInput').value = '';
      document.getElementById('photoPreview').innerHTML = '';
      currentPhotoBase64 = null;
      
    } catch (error) {
      console.error('Ошибка:', error);
      toast('Ошибка при отправке', 'error');
    }
  }

  function render() {
    const container = document.getElementById('list');
    if (!filtered.length) {
      container.innerHTML = `<div class="empty-list"><i class="fas fa-tree"></i> Пока никого не добавили. Станьте хранителем памяти!</div>`;
      return;
    }
    
    container.innerHTML = filtered.slice(0, 120).map(item => {
      const fullName = item.fullName || `${item.lastName || ''} ${item.firstName || ''} ${item.middleName || ''}`.trim();
      const photoHtml = item.photoUrl ?
        `<img src="${item.photoUrl}" onclick="event.stopPropagation(); openModal('${item.photoUrl}')">` :
        `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#181c2a;color:#9e966b;"><i class="fas fa-user-circle"></i></div>`;
      return `
        <div class="veteran-card" onclick="openModal('${item.photoUrl || ''}')">
          <div class="veteran-photo">${photoHtml}</div>
          <div class="veteran-info">
            <div class="veteran-name">
              <span><i class="fas fa-medal"></i> ${escapeHtml(fullName)}</span>
              <span class="veteran-category">${escapeHtml(item.category || '')}</span>
            </div>
            <div class="representative"><i class="fas fa-user-check"></i> Представитель: ${escapeHtml(item.representative || 'Не указан')}</div>
            <div class="bio-short"><i class="fas fa-book-open"></i> ${escapeHtml((item.biography || 'Нет описания').substring(0, 110))}${(item.biography || '').length > 110 ? '…' : ''}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
  function filterList(q) {
    const lower = q.toLowerCase();
    filtered = !lower ? [...cache] : cache.filter(item => 
      (item.fullName || '').toLowerCase().includes(lower) ||
      (item.biography || '').toLowerCase().includes(lower) ||
      (item.representative || '').toLowerCase().includes(lower)
    );
    render();
  }
  function openModal(url) { if (url) { document.getElementById('modalImage').src = url; document.getElementById('photoModal').classList.add('active'); } }
  function closeModal() { document.getElementById('photoModal').classList.remove('active'); }
  function toast(msg, type) { const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast show ${type}`; setTimeout(() => t.classList.remove('show'), 3000); }

  window.submitForm = submitForm;
  window.filterList = filterList;
  window.openModal = openModal;
  window.closeModal = closeModal;

  loadAllVeterans();
</script>
</body>
</html>
