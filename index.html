<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Регистрация участника</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin-bottom: 32px;
            border-bottom: 1px solid #eee;
            padding-bottom: 16px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            margin-top: 8px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        .success {
            background: #10b981;
            color: white;
            padding: 14px;
            border-radius: 20px;
            margin-top: 24px;
            font-weight: 500;
            display: none;
        }

        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 20px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info {
            font-size: 12px;
            color: #888;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        .field-required {
            color: #dc2626;
            margin-left: 4px;
        }

        /* Стили для админ-панели */
        .admin-panel {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 2px dashed #667eea;
        }

        .admin-btn {
            background: #333 !important;
            margin-top: 12px !important;
}

        .admin-hint {
            margin-top: 12px;
            background: #f0f0f0;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            text-align: left;
        }

        .participant-list {
            margin-top: 16px;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 8px;
        }

        .participant-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .participant-item:last-child {
            border-bottom: none;
        }

        .clear-btn {
            background: #dc2626 !important;
            margin-top: 8px !important;
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <h1>📝  Регистрация участника</h1>
        <div class="subtitle">Пожалуйста, представьтесь для входа</div>

        <form id="registerForm">
            <div class="form-group">
                <label>Фамилия <span class="field-required">*</span></label>
                <input type="text" id="lastName" placeholder="Иванов" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label>Имя <span class="field-required">*</span></label>
                <input type="text" id="firstName" placeholder="Иван" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label>Отчество</label>
                <input type="text" id="middleName" placeholder="Иванович (при наличии)" autocomplete="off">
            </div>

            <button type="submit" id="submitBtn">✅ Записаться на мероприятие</button>
        </form>

        <div id="successMessage" class="success"></div>
        <div id="errorMessage" class="error"></div>
        <div class="info">
            🔒 Нажимая кнопку, вы даёте согласие на обработку персональных данных
        </div>
    </div>

    <script>
        // === НАСТРОЙКА: сюда данные будут отправляться ===
        // Раскомментируйте и вставьте вашу ссылку от Google Apps Script, если хотите отправку в Google Таблицы
        // const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/ВАШ_АЙДИ/exec';
        
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('submitBtn');
        const successDiv = document.getElementById('successMessage');
        const errorDiv = document.getElementById('errorMessage');

        // Вспомогательные функции
        function showSuccess(text) {
            successDiv.style.display = 'block';
            successDiv.innerText = text || '✓ Вы успешно зарегистрированы! Добро пожаловать.';
            errorDiv.style.display = 'none';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        function showError(text) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = text || '❌ Ошибка. Попробуйте ещё раз или обратитесь к организатору.';
            successDiv.style.display = 'none';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Отправка...';
            } else {
                btn.disabled = false;
                btn.innerHTML = '✅ Записаться на мероприятие';
            }
        }

        // Получить ФИО одной строкой
        function getFullName() {
            const lastName = document.getElementById('lastName').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const middleName = document.getElementById('middleName').value.trim();
            
            let fullName = `${lastName} ${firstName}`;
            if (middleName) fullName += ` ${middleName}`;
            return fullName;
}

        // Сохранить запись в локальном хранилище
        function saveToLocal(data) {
            try {
                let participants = JSON.parse(localStorage.getItem('participants') || '[]');
                data.id = Date.now();
                data.timestamp = new Date().toLocaleString('ru-RU');
                participants.push(data);
                localStorage.setItem('participants', JSON.stringify(participants));
                return true;
            } catch(e) {
                console.error(e);
                return false;
            }
        }

        // Получить всех участников
        function getParticipants() {
            try {
                return JSON.parse(localStorage.getItem('participants') || '[]');
            } catch(e) {
                return [];
            }
        }

        // Очистить всех участников
        function clearParticipants() {
            if (confirm('Вы уверены, что хотите удалить ВСЕХ участников? Это действие нельзя отменить.')) {
                localStorage.setItem('participants', '[]');
                showSuccess('Список участников очищен');
                if (window.location.search.includes('admin=1')) {
                    location.reload();
                }
            }
        }

        // Отправить в Google Sheets или локально
        async function sendToGoogleSheets(data) {
            if (typeof GOOGLE_SCRIPT_URL !== 'undefined' && GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL.includes('script.google.com')) {
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    return true;
                } catch(e) {
                    console.error('Google Sheets error:', e);
                    return false;
                }
            } else {
                return saveToLocal(data);
            }
        }

        // Скачать CSV
        function downloadParticipants() {
            const participants = getParticipants();
            if (participants.length === 0) {
                alert('Список участников пуст');
                return;
            }
            
            let csv = "ID,Фамилия,Имя,Отчество,Полное имя,Время регистрации\n";
            participants.forEach(p => {
                const row = [
                    p.id,
                    p.lastName,
                    p.firstName,
                    p.middleName || '',
                    p.fullName,
                    p.timestamp
                ].map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',');
                csv += row + "\n";
            });
            
            const blob = new Blob(["\uFEFF" + csv], {type: 'text/csv;charset=utf-8;'});
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `participants_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showSuccess(`Скачано ${participants.length} записей`);
        }

        // Показать список участников на странице (админ-режим)
        function showParticipantsList() {
            const participants = getParticipants();
            const container = document.getElementById('participantsList');
            if (!container) return;
            
            if (participants.length === 0) {
                container.innerHTML = '<div class="participant-item" style="color:#888;">Пока никого нет</div>';
                return;
            }
            
            let html = '';
            participants.slice().reverse().forEach(p => {

html += `<div class="participant-item">
                    <strong>${p.fullName}</strong><br>
                    <small style="color:#888;">${p.timestamp}</small>
                </div>`;
            });
            container.innerHTML = html;
        }

        // Основной обработчик отправки
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const lastName = document.getElementById('lastName').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            
            if (!lastName || !firstName) {
                showError('Пожалуйста, заполните фамилию и имя');
                return;
            }

            const middleName = document.getElementById('middleName').value.trim();
            const fullName = getFullName();

            const participantData = {
                lastName,
                firstName,
                middleName,
                fullName
            };

            setLoading(true);
            
            try {
                const result = await sendToGoogleSheets(participantData);
                
                if (result !== false) {
                    showSuccess(`${fullName}, спасибо за регистрацию! Ждём вас.`);
                    form.reset();
                    
                    // Обновляем список в админ-режиме
                    if (window.location.search.includes('admin=1')) {
                        showParticipantsList();
                    }
                } else {
                    showError('Не удалось сохранить. Попробуйте позже.');
                }
            } catch (err) {
                console.error(err);
                showError('Ошибка соединения. Проверьте интернет.');
            } finally {
                setLoading(false);
            }
        });

        // ========== АДМИН-РЕЖИМ ==========
        // Если в URL есть ?admin=1 — показываем панель управления
        if (window.location.search.includes('admin=1')) {
            const card = document.querySelector('.card');
            
            // Создаём панель администратора
            const adminPanel = document.createElement('div');
            adminPanel.className = 'admin-panel';
            adminPanel.innerHTML = `
                <div style="background:#667eea; color:white; padding:8px; border-radius:12px; text-align:center; margin-bottom:16px;">
                    ⚙️  Админ-панель
                </div>
                <button id="adminDownloadBtn" class="admin-btn" style="background:#667eea !important;">📥 Скачать список (CSV)</button>
                <button id="adminClearBtn" class="admin-btn clear-btn">🗑️  Очистить всех участников</button>
                <div class="admin-hint">
                    📊  Всего зарегистрировано: <strong id="totalCount">0</strong>
                </div>
                <div id="participantsList" class="participant-list"></div>
            `;
            card.appendChild(adminPanel);
            
            // Обновляем счётчик и список
            function updateAdminPanel() {
                const participants = getParticipants();
                const totalSpan = document.getElementById('totalCount');
                if (totalSpan) totalSpan.innerText = participants.length;
                showParticipantsList();
            }
            
            // Вешаем обработчики
            document.getElementById('adminDownloadBtn').onclick = downloadParticipants;
            document.getElementById('adminClearBtn').onclick = clearParticipants;
            
            // Заполняем данные
            updateAdminPanel();
            
            // Добавляем подсказку о том, где хранятся данные
            const storageHint = document.createElement('div');
            storageHint.className = 'admin-hint';
            storageHint.style.marginTop = '8px';
            storageHint.style.fontSize = '11px';

storageHint.style.color = '#666';
            storageHint.innerHTML = '💾  Данные хранятся в вашем браузере. При очистке кэша они удалятся. Для постоянного хранения настройте Google Таблицы.';
            card.appendChild(storageHint);
        }
    </script>
</body>
</html>
